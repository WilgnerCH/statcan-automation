name: Monthly StatCan Extraction

on:
  schedule:
    - cron: '0 10 20 * *'  # todo dia 20 às 10h UTC (mais seguro)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests pandas python-dateutil

      - name: Run script
        run: python src/fetch_statcan.py

      - name: Commit updated dataset
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/*.csv || echo "No CSV files to add"
          git commit -m "Monthly data update" || echo "Nothing to commit"
          git push || echo "Nothing to push"
